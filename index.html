        transform: scale(0.5);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }

    function startExam() {

      document.getElementById('exam-section').classList.remove('hidden');
      renderQuestions();
      lucide.createIcons();
    }

    function renderQuestions() {
      const container = document.getElementById('questions-container');
      container.innerHTML = '';
      
      questions.forEach((question, index) => {
        let questionHTML = `
          <div class="question-card bg-white rounded-lg shadow-md p-6">
            <h3 class="text-lg font-bold text-gray-800 mb-4">السؤال ${index + 1}</h3>
            <p class="text-gray-700 font-semibold mb-4">${question.text}</p>
        `;

        if (question.type === 'multiple') {
          // أسئلة الاختيار المتعدد
          questionHTML += `
            <div class="space-y-3">
              ${question.options.map(option => `
                <button class="option-btn w-full text-right px-4 py-3 border-2 border-gray-300 rounded-lg hover:border-purple-600 hover:bg-gray-50 transition"
                  data-question="${question.id}" data-value="${option.value}">
                  <span class="font-semibold">${option.value}.</span> ${option.text}
                </button>
              `).join('')}
            </div>
          `;
        } else if (question.type === 'truefalse') {
          // أسئلة صح/غلط
          questionHTML += `
            <div class="flex gap-4">
              <button class="option-btn flex-1 px-4 py-3 border-2 border-green-300 rounded-lg bg-green-50 hover:border-green-600 hover:bg-green-100 transition font-semibold"
                data-question="${question.id}" data-value="true">
                ✅ صحيح
              </button>
              <button class="option-btn flex-1 px-4 py-3 border-2 border-red-300 rounded-lg bg-red-50 hover:border-red-600 hover:bg-red-100 transition font-semibold"
                data-question="${question.id}" data-value="false">
                ❌ غلط
              </button>
            </div>
          `;
        } else if (question.type === 'essay') {
          // أسئلة مقالية
          questionHTML += `
            <textarea id="${question.id}" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-600 min-h-[120px] resize-none"
              placeholder="اكتب إجابتك هنا..." dir="rtl"></textarea>
          `;
        }

        questionHTML += `</div>`;
        container.innerHTML += questionHTML;
      });

      // إضافة مستمعي الأحداث
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', selectOption);
      });

      // إضافة مستمعي الأحداث للأسئلة المقالية
      document.querySelectorAll('textarea').forEach(textarea => {
        textarea.addEventListener('input', saveEssayAnswer);
      });

      lucide.createIcons();
    }

    function selectOption(e) {
      const questionId = e.currentTarget.dataset.question;
      const value = e.currentTarget.dataset.value;
      
      // إزالة التحديد السابق
      document.querySelectorAll(`[data-question="${questionId}"]`).forEach(btn => {
        btn.classList.remove('selected', 'bg-purple-600', 'text-white', 'border-purple-600', 'bg-green-600', 'bg-red-600');
      });
      
      // إضافة التحديد الجديد
      e.currentTarget.classList.add('selected');
      if (e.currentTarget.textContent.includes('صحيح')) {
        e.currentTarget.classList.add('bg-green-600', 'text-white', 'border-green-600');
      } else if (e.currentTarget.textContent.includes('غلط')) {
        e.currentTarget.classList.add('bg-red-600', 'text-white', 'border-red-600');
      } else {
        e.currentTarget.classList.add('bg-purple-600', 'text-white', 'border-purple-600');
      }
      
      studentAnswers[questionId] = value;
      updateProgress();
    }

    function saveEssayAnswer(e) {
      const textareaId = e.target.id;
      studentAnswers[textareaId] = e.target.value;
      updateProgress();
    }

    function updateProgress() {
      const answered = Object.keys(studentAnswers).length;
      document.getElementById('progress').textContent = `${answered}/16`;
      document.getElementById('progress-bar').style.width = `${(answered / 16) * 100}%`;
    }

    function calculateScore() {
      let score = 0;
      
      questions.forEach(q => {
        if (q.type === 'essay') {
          // الأسئلة المقالية لا تُحسب آلياً، تُترك للمعلم
          if (studentAnswers[q.id] && studentAnswers[q.id].trim().length > 0) {
            // يمكن حساب نقطة على الإجابة إذا كانت موجودة
            score += 1; // كل إجابة مقالية = نقطة واحدة
          }
        } else {
          // الأسئلة الموضوعية تُحسب آلياً
          if (studentAnswers[q.id] === q.correctAnswer) {
            score++;
          }
        }
      });
      
      return score;
    }

    function showNotification(message) {
      const notification = document.createElement('div');
      notification.className = 'fixed top-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.remove();
      }, 3000);
    }

    function submitExam() {
      if (Object.keys(studentAnswers).length === 0) {
        showNotification('يرجى الإجابة على سؤال واحد على الأقل');
        return;
      }

      const score = calculateScore();
      const totalScore = 31; // 16 + 8 + 7
      const percentage = (score / totalScore) * 100;
      
      // حفظ البيانات في Data SDK
      const recordData = {
        student_name: currentStudent.name,
        student_phone: currentStudent.phone,
        q1_answer: studentAnswers.q1 || '',
        q2_answer: studentAnswers.q2 || '',
        q3_answer: studentAnswers.q3 || '',
        q4_answer: studentAnswers.q4 || '',
        q5_answer: studentAnswers.q5 || '',
        q6_answer: studentAnswers.q6 || '',
        q7_answer: studentAnswers.q7 || '',
        q8_answer: studentAnswers.q8 || '',
        q9_answer: studentAnswers.q9 || '',
        q10_answer: studentAnswers.q10 || '',
        q11_answer: studentAnswers.q11 || '',
        q12_answer: studentAnswers.q12 || '',
        q13_answer: studentAnswers.q13 || '',
        q14_answer: studentAnswers.q14 || '',
        q15_answer: studentAnswers.q15 || '',
        q16_answer: studentAnswers.q16 || '',
        q17_answer: studentAnswers.q17 || '',
        q18_answer: studentAnswers.q18 || '',
        q19_answer: studentAnswers.q19 || '',
        q20_answer: studentAnswers.q20 || '',
        q21_answer: studentAnswers.q21 || '',
        q22_answer: studentAnswers.q22 || '',
        q23_answer: studentAnswers.q23 || '',
        q24_answer: studentAnswers.q24 || '',
        q25_answer: studentAnswers.q25 || '',
        q26_answer: studentAnswers.q26 || '',
        q27_answer: studentAnswers.q27 || '',
        q28_answer: studentAnswers.q28 || '',
        q29_answer: studentAnswers.q29 || '',
        q30_answer: studentAnswers.q30 || '',
        q31_answer: studentAnswers.q31 || '',
        score: score,
        total_questions: 31,
        submitted_at: new Date().toISOString()
      };

      // حفظ محلياً في LocalStorage
      localStorage.setItem(`exam_${currentStudent.name}_${Date.now()}`, JSON.stringify(recordData));
      
      // إرسال للمعلم عبر الواتساب
      sendToTeacher(score, percentage, totalScore);
      
      // عرض النتائج
      showResults(score, percentage, totalScore);
    }

    function sendToTeacher(score, percentage, totalScore) {
      let message = `
*📋 تقرير امتحان الطالب*
━━━━━━━━━━━━━━━━━━━
*الاسم:* ${currentStudent.name}
*التاريخ:* ${new Date().toLocaleString('ar-EG')}

━━━━━━━━━━━━━━━━━━━
*الإجابات:*

🔵 *الأسئلة الاختيار المتعدد (1-16):*
`;

      for (let i = 1; i <= 16; i++) {
        const q = questions[i - 1];
        const answer = studentAnswers[`q${i}`];
        const isCorrect = answer === q.correctAnswer ? '✅' : '❌';
        message += `\nس${i}: ${isCorrect} (الإجابة: ${answer})`;
      }

      message += `\n\n🟡 *أسئلة صح/غلط (17-24):*\n`;
      for (let i = 17; i <= 24; i++) {
        const q = questions[i - 1];
        const answer = studentAnswers[`q${i}`] === 'true' ? 'صحيح' : 'غلط';
        const isCorrect = studentAnswers[`q${i}`] === q.correctAnswer ? '✅' : '❌';
        message += `\nس${i}: ${isCorrect} (الإجابة: ${answer})`;
      }

      message += `\n\n🟠 *الأسئلة المقالية (25-31):*\n`;
      for (let i = 25; i <= 31; i++) {
        const answer = studentAnswers[`q${i}`] ? studentAnswers[`q${i}`].substring(0, 50) + '...' : 'لم تتم الإجابة';
        message += `\nس${i}:\n${answer}\n`;
      }

      message += `
━━━━━━━━━━━━━━━━━━━
*📊 النتيجة النهائية:*
*الدرجة:* ${score}/${totalScore}
*النسبة المئوية:* ${percentage.toFixed(2)}%
      `.trim();

      const encodedMessage = encodeURIComponent(message);
      const whatsappURL = `https://wa.me/+201515474939?text=${encodedMessage}`;
      
      window.open(whatsappURL, '_blank');
    }

    function showResults(score, percentage, totalScore) {
      document.getElementById('exam-section').classList.add('hidden');
      document.getElementById('results-section').classList.remove('hidden');
      
      document.getElementById('final-score').textContent = `${score}/${totalScore}`;
      document.getElementById('percentage').textContent = `${percentage.toFixed(2)}%`;
      
      // تقييم الأداء
      let rating = '';
      let emoji = '';
      if (percentage >= 90) {
        rating = '🌟 ممتاز جداً! أداء رائع';
        emoji = '🎉';
      } else if (percentage >= 75) {
        rating = '👏 جيد جداً! استمر هكذا';
        emoji = '😊';
      } else if (percentage >= 60) {
        rating = '📚 جيد! يمكنك الأفضل';
        emoji = '💪';
      } else if (percentage >= 40) {
        rating = '⚠️ متوسط - احتاج مراجعة';
        emoji = '🤔';
      } else {
        rating = '❌ ضعيف - يحتاج اهتمام أكثر';
        emoji = '📖';
      }
      
      document.getElementById('rating-text').textContent = rating;
      document.getElementById('rating-emoji').textContent = emoji;
      
      lucide.createIcons();
    }

    function downloadAnswers() {
      const score = calculateScore();
      let answersText = '===== الأسئلة الاختيار المتعدد =====\n';
      
      for (let i = 1; i <= 16; i++) {
        const q = questions[i - 1];
        const studentAnswer = studentAnswers[`q${i}`];
        const isCorrect = studentAnswer === q.correctAnswer ? 'صحيح ✅' : 'خطأ ❌';
        answersText += `السؤال ${i}: ${isCorrect} - الإجابة: ${studentAnswer}\n`;
      }

      answersText += '\n===== أسئلة صح/غلط =====\n';
      for (let i = 17; i <= 24; i++) {
        const q = questions[i - 1];
        const studentAnswer = studentAnswers[`q${i}`] === 'true' ? 'صحيح' : 'غلط';
        const isCorrect = studentAnswers[`q${i}`] === q.correctAnswer ? 'صحيح ✅' : 'خطأ ❌';
        answersText += `السؤال ${i}: ${isCorrect} - الإجابة: ${studentAnswer}\n`;
      }

      answersText += '\n===== الأسئلة المقالية =====\n';
      for (let i = 25; i <= 31; i++) {
        const studentAnswer = studentAnswers[`q${i}`] || 'لم تتم الإجابة';
        answersText += `السؤال ${i}:\n${studentAnswer}\n\n`;
      }

      const fullText = `
تقرير الامتحان
الطالب: ${currentStudent.name}
التاريخ: ${new Date().toLocaleString('ar-EG')}
الدرجة: ${score}/31

${answersText}
      `;

      const element = document.createElement('a');
      element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(fullText));
      element.setAttribute('download', `امتحان_${currentStudent.name}.txt`);
      element.click();
    }

    // أحداث النماذج
    document.getElementById('registration-form').addEventListener('submit', (e) => {
      e.preventDefault();
      currentStudent.name = document.getElementById('student-name').value;
      currentStudent.phone = 'لم يتم الإفصاح';
      document.getElementById('student-info').textContent = `الطالب: ${currentStudent.name}`;
      startExam();
    });

    document.getElementById('submit-btn').addEventListener('click', submitExam);
    document.getElementById('restart-btn').addEventListener('click', () => location.reload());
    document.getElementById('download-btn').addEventListener('click', downloadAnswers);

    // تهيئة SDK
    (async () => {
      lucide.createIcons();
    })();
  </script>
